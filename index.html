<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Perked · Card Benefits Tracker</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['-apple-system','BlinkMacSystemFont','SF Pro Text','Segoe UI','Roboto','Helvetica','Arial','sans-serif'],
        },
      },
    },
  };
</script>
<style>
  html, body { background:#f2f2f7; -webkit-font-smoothing:antialiased; }
  * { -webkit-tap-highlight-color: transparent; }
  .metal {
    background:
      radial-gradient(120% 140% at 0% 0%, rgba(255,255,255,.14), rgba(255,255,255,0) 45%),
      radial-gradient(120% 140% at 100% 100%, rgba(120,140,180,.18), rgba(0,0,0,0) 50%),
      linear-gradient(135deg, #1c1f27 0%, #2a2f3a 38%, #14161c 100%);
    box-shadow: 0 24px 60px -20px rgba(10,12,20,.7), inset 0 1px 0 rgba(255,255,255,.06);
  }
  .sheen { background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,.10) 47%, rgba(255,255,255,.02) 53%, transparent 70%); }
  .fade-in { animation: fade .28s ease both; }
  @keyframes fade { from { opacity:0; transform: translateY(4px);} to {opacity:1; transform:none;} }
  .pop { animation: pop .22s cubic-bezier(.2,.9,.3,1.3) both; }
  @keyframes pop { 0%{transform:scale(.6);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { background:#d0d0d6; border-radius:8px; }
  .no-scrollbar::-webkit-scrollbar{ display:none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ----------------------------- constants ----------------------------- */
const CADENCES = {
  monthly:    { label: 'Monthly',     short:'mo',  n: 12 },
  quarterly:  { label: 'Quarterly',   short:'qtr', n: 4  },
  semiannual: { label: 'Semi-annual', short:'half',n: 2  },
  annual:     { label: 'Annual',      short:'yr',  n: 1  },
  perk:       { label: 'Perk',        short:'',    n: 0  },
};
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const CARD_COLORS = [
  { id:'graphite', name:'Graphite', css:'linear-gradient(135deg,#23262e,#0e0f13)' },
  { id:'platinum', name:'Platinum', css:'linear-gradient(135deg,#cfd3da,#9aa0ab)' },
  { id:'gold',     name:'Gold',     css:'linear-gradient(135deg,#e9c46a,#b8860b)' },
  { id:'sapphire', name:'Sapphire', css:'linear-gradient(135deg,#274690,#0b1d51)' },
  { id:'emerald',  name:'Emerald',  css:'linear-gradient(135deg,#1f9d6b,#0c5c41)' },
  { id:'rose',     name:'Rose',     css:'linear-gradient(135deg,#e26d8a,#9d3b56)' },
  { id:'plum',     name:'Plum',     css:'linear-gradient(135deg,#6d4b9f,#3a2364)' },
  { id:'ocean',    name:'Ocean',    css:'linear-gradient(135deg,#0fb5c9,#0a5e78)' },
];
const colorCss = (id) => (CARD_COLORS.find(c=>c.id===id)||CARD_COLORS[0]).css;
const lightColor = (id) => id==='platinum' || id==='gold';

/* ----------------------------- templates ----------------------------- */
// value = amount per period (per checkbox). annual potential = value * n.
const uid = () => Math.random().toString(36).slice(2,9);
const B = (name, value, cadence, note='') => ({ id: uid(), name, value, cadence, note });

const TEMPLATES = [
  { name:'The Platinum Card', issuer:'Amex', color:'graphite', fee:695, resetType:'anniversary', benefits:[
    B('Uber Cash', 15, 'monthly', '$15/mo in-app, $35 in December'),
    B('Digital Entertainment', 20, 'monthly', 'Disney+, NYT, WSJ, etc.'),
    B('Airline Fee Credit', 200, 'annual', 'Incidental fees on one airline'),
    B('Hotel Credit', 200, 'annual', 'FHR / The Hotel Collection'),
    B('Saks Fifth Avenue', 50, 'semiannual', '$50 Jan–Jun, $50 Jul–Dec'),
    B('CLEAR Plus', 199, 'annual', 'Membership reimbursement'),
    B('Equinox / SoulCycle', 300, 'annual', 'Fitness credit'),
    B('Global Entry / TSA PreCheck', 120, 'perk', 'Every 4 years'),
    B('Centurion Lounge access', 0, 'perk', 'Unlimited lounge entry'),
  ]},
  { name:'Gold Card', issuer:'Amex', color:'gold', fee:325, resetType:'anniversary', benefits:[
    B('Dining Credit', 10, 'monthly', 'Grubhub, Resy, Five Guys, etc.'),
    B('Uber Cash', 10, 'monthly', 'Rides & Eats'),
    B('Resy Credit', 50, 'semiannual', '$50 Jan–Jun, $50 Jul–Dec'),
    B('Dunkin Credit', 7, 'monthly', '$7/mo on $2+ purchases'),
  ]},
  { name:'Sapphire Reserve', issuer:'Chase', color:'sapphire', fee:550, resetType:'anniversary', benefits:[
    B('Travel Credit', 300, 'annual', 'Auto-applies to travel'),
    B('DoorDash Restaurant', 5, 'monthly', '$5 promo each month'),
    B('Lyft Credit', 10, 'monthly', 'In-app Lyft credit'),
    B('Global Entry / TSA PreCheck', 100, 'perk', 'Every 4 years'),
    B('Priority Pass lounges', 0, 'perk', 'Unlimited visits'),
  ]},
  { name:'Venture X', issuer:'Capital One', color:'emerald', fee:395, resetType:'anniversary', benefits:[
    B('Travel Credit', 300, 'annual', 'Through Capital One Travel'),
    B('Anniversary Miles', 10000, 'perk', '10,000 bonus miles each year'),
    B('Capital One Lounge access', 0, 'perk', 'Unlimited for you'),
  ]},
  { name:'Blue Cash Preferred', issuer:'Amex', color:'ocean', fee:95, resetType:'calendar', benefits:[
    B('Disney Bundle Credit', 7, 'monthly', '$7/mo statement credit'),
  ]},
  { name:'Custom card', issuer:'', color:'plum', fee:0, resetType:'calendar', benefits:[] },
];

/* ----------------------------- date logic ----------------------------- */
const fmtDate = (d) => `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
const fmtShortDate = (d) => `${MONTHS[d.getMonth()]} ${d.getDate()}`;

function annualCycle(card, now) {
  if (card.resetType === 'anniversary' && card.anniversaryDate) {
    const [ , am, ad] = card.anniversaryDate.split('-').map(Number);
    let start = new Date(now.getFullYear(), am-1, ad);
    if (start > now) start = new Date(now.getFullYear()-1, am-1, ad);
    const renews = new Date(start.getFullYear()+1, am-1, ad);
    return { key:`AN-${start.getFullYear()}-${am}-${ad}`, renews, start, label: fmtDate(renews) };
  }
  const start = new Date(now.getFullYear(),0,1);
  const renews = new Date(now.getFullYear()+1,0,1);
  return { key:`A-${now.getFullYear()}`, renews, start, label:`Jan 1, ${now.getFullYear()+1}` };
}

// all periods of a benefit within the current display window
function periodsFor(card, benefit, now) {
  const c = benefit.cadence, y = now.getFullYear();
  if (c === 'perk') return [];
  if (c === 'monthly')
    return MONTHS.map((m,i)=>({ key:`${y}-M${i}`, label:m, full:`${MONTHS_FULL[i]} ${y}`, isCurrent: i===now.getMonth() }));
  if (c === 'quarterly')
    return [0,1,2,3].map(i=>({ key:`${y}-Q${i}`, label:`Q${i+1}`, full:`Q${i+1} ${y}`, isCurrent: i===Math.floor(now.getMonth()/3) }));
  if (c === 'semiannual')
    return [0,1].map(i=>({ key:`${y}-H${i}`, label:i===0?'H1':'H2', full:i===0?`Jan–Jun ${y}`:`Jul–Dec ${y}`, isCurrent: i===(now.getMonth()<6?0:1) }));
  // annual
  const cyc = annualCycle(card, now);
  return [{ key:cyc.key, label:String(cyc.start.getFullYear()), full:`Renews ${cyc.label}`, isCurrent:true, renews:cyc }];
}

function currentPeriod(card, benefit, now) {
  return periodsFor(card, benefit, now).find(p=>p.isCurrent) || null;
}

/* ----------------------------- money ----------------------------- */
const money = (n) => {
  const v = Math.round(n*100)/100;
  return '$' + (Number.isInteger(v) ? v.toLocaleString() : v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}));
};
const annualPotential = (b) => b.cadence==='perk' ? 0 : b.value * CADENCES[b.cadence].n;

/* ----------------------------- storage ----------------------------- */
const STORE = 'perked.v1';
function load() {
  try { const r = JSON.parse(localStorage.getItem(STORE)); if (r) return r; } catch(e){}
  return null;
}
function save(state) {
  try { localStorage.setItem(STORE, JSON.stringify(state)); } catch(e){}
}

/* ----------------------------- icons ----------------------------- */
const Ic = {
  plus:  (p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" {...p}><path d="M12 5v14M5 12h14"/></svg>,
  check: (p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 13l4 4L19 7"/></svg>,
  chev:  (p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9 6l6 6-6 6"/></svg>,
  edit:  (p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>,
  trash: (p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>,
  x:     (p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" {...p}><path d="M6 6l12 12M18 6L6 18"/></svg>,
  cal:   (p)=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>,
  spark: (p)=><svg viewBox="0 0 24 24" fill="currentColor" {...p}><path d="M12 2l1.6 6.4L20 10l-6.4 1.6L12 18l-1.6-6.4L4 10l6.4-1.6z"/></svg>,
};

/* ----------------------------- small UI ----------------------------- */
function CheckCircle({ checked, current, onClick, size=26 }) {
  return (
    <button onClick={onClick} className="shrink-0 grid place-items-center rounded-full transition active:scale-90"
      style={{ width:size, height:size }}>
      <span className="grid place-items-center rounded-full transition-all"
        style={{
          width:size, height:size,
          border: checked ? 'none' : `2px solid ${current ? '#0a84ff' : '#c7c7cc'}`,
          background: checked ? (current ? '#0a84ff' : '#34c759') : 'transparent',
          color:'#fff',
        }}>
        {checked && <Ic.check style={{ width:size*0.6, height:size*0.6 }} className="pop"/>}
      </span>
    </button>
  );
}

function Pill({ children, tone='gray' }) {
  const tones = {
    gray:'bg-gray-100 text-gray-500',
    blue:'bg-blue-50 text-blue-600',
    green:'bg-green-50 text-green-600',
    amber:'bg-amber-50 text-amber-700',
    purple:'bg-purple-50 text-purple-600',
  };
  return <span className={`text-[11px] font-semibold px-2 py-[3px] rounded-full ${tones[tone]}`}>{children}</span>;
}

/* ----------------------------- hero ----------------------------- */
function Hero({ stats, now }) {
  return (
    <div className="relative overflow-hidden rounded-[26px] metal text-white p-5 sm:p-6">
      <div className="absolute inset-0 sheen pointer-events-none"></div>
      <div className="relative">
        <div className="flex items-center gap-2 text-white/55 text-xs font-semibold tracking-wide uppercase">
          <Ic.spark style={{width:14,height:14}} className="text-amber-300"/>
          Available to claim now
        </div>
        <div className="mt-1 flex items-end gap-3">
          <div className="text-[44px] leading-none font-bold tracking-tight">{money(stats.claimable)}</div>
          {stats.claimableCount>0 &&
            <div className="mb-1 text-white/60 text-sm font-medium">{stats.claimableCount} {stats.claimableCount===1?'benefit':'benefits'} live</div>}
        </div>
        <div className="mt-5 grid grid-cols-2 sm:grid-cols-4 gap-px rounded-2xl overflow-hidden bg-white/10">
          <Stat label={`Captured ${now.getFullYear()}`} value={money(stats.captured)} sub={`of ${money(stats.potential)}`} />
          <Stat label="Annual potential" value={money(stats.potential)} sub="all credits" />
          <Stat label="Annual fees" value={money(stats.fees)} sub={`${stats.cardCount} cards`} />
          <Stat label="Net captured" value={money(stats.net)} sub="value − fees"
            tone={stats.net>=0?'pos':'neg'} />
        </div>
      </div>
    </div>
  );
}
function Stat({ label, value, sub, tone }) {
  const color = tone==='pos' ? 'text-emerald-300' : tone==='neg' ? 'text-rose-300' : 'text-white';
  return (
    <div className="bg-[#1a1d24]/70 px-3.5 py-3">
      <div className="text-[10.5px] uppercase tracking-wide text-white/45 font-semibold">{label}</div>
      <div className={`mt-1 text-lg font-bold tabular-nums ${color}`}>{value}</div>
      <div className="text-[11px] text-white/40">{sub}</div>
    </div>
  );
}

/* ----------------------------- To-Do view ----------------------------- */
function TodoView({ cards, checks, now, toggle, users }) {
  const items = [];
  cards.forEach(card => {
    card.benefits.forEach(b => {
      if (b.cadence === 'perk') return;
      const p = currentPeriod(card, b, now);
      if (!p) return;
      const key = `${card.id}|${b.id}|${p.key}`;
      const rec = checks[key];
      items.push({ card, b, p, key, checked: !!rec, rec });
    });
  });
  const todo = items.filter(i=>!i.checked);
  const done = items.filter(i=>i.checked).sort((a,b)=> (b.rec?.at||0)-(a.rec?.at||0));

  const periodLabel = (b,p) => b.cadence==='annual' ? (p.renews ? `renews ${fmtShortDate(p.renews.renews)}` : 'this year')
    : b.cadence==='monthly' ? p.full.split(' ')[0]
    : p.label;

  if (items.length===0)
    return <Empty title="Nothing to track yet" sub="Add a card to start your checklist." />;

  return (
    <div className="space-y-6 fade-in">
      <div>
        <SectionHead title="To-Do" count={todo.length} accent />
        <div className="bg-white rounded-2xl shadow-sm divide-y divide-gray-100 overflow-hidden">
          {todo.length===0 && <div className="px-4 py-8 text-center text-gray-400 text-sm">🎉 All caught up for this period.</div>}
          {todo.map(i => (
            <Row key={i.key} {...i} now={now}
              meta={`${i.card.name} · ${periodLabel(i.b,i.p)}`}
              onToggle={()=>toggle(i.key)} cardColor={i.card.color}/>
          ))}
        </div>
      </div>

      {done.length>0 &&
        <div>
          <SectionHead title="Done this period" count={done.length}/>
          <div className="bg-white rounded-2xl shadow-sm divide-y divide-gray-100 overflow-hidden">
            {done.map(i => (
              <Row key={i.key} {...i} now={now} dim
                meta={`${i.card.name} · ${i.rec?.by||'?'} · ${i.rec?.at?relTime(i.rec.at,now):''}`}
                onToggle={()=>toggle(i.key)} cardColor={i.card.color}/>
            ))}
          </div>
        </div>}
    </div>
  );
}

function Row({ b, p, checked, current, onToggle, meta, dim, cardColor }) {
  return (
    <div className={`flex items-center gap-3 px-3.5 py-3 ${dim?'opacity-60':''}`}>
      <CheckCircle checked={checked} current={!checked} onClick={onToggle}/>
      <span className="w-1.5 h-9 rounded-full shrink-0" style={{ background: colorCss(cardColor) }}></span>
      <div className="min-w-0 flex-1">
        <div className={`font-semibold text-[15px] leading-tight ${checked?'line-through text-gray-400':'text-gray-900'}`}>{b.name}</div>
        <div className="text-[12.5px] text-gray-400 truncate">{meta}</div>
      </div>
      <div className={`text-[15px] font-bold tabular-nums ${checked?'text-gray-300':'text-gray-900'}`}>{money(b.value)}</div>
    </div>
  );
}

function relTime(at, now) {
  const s = Math.max(0,(now.getTime()-at)/1000);
  if (s<60) return 'just now';
  if (s<3600) return `${Math.floor(s/60)}m ago`;
  if (s<86400) return `${Math.floor(s/3600)}h ago`;
  const d = new Date(at);
  return fmtShortDate(d);
}

/* ----------------------------- All Cards view ----------------------------- */
function CardsView({ cards, checks, now, toggle, onEdit, onDelete, openExpanded, setOpenExpanded }) {
  if (cards.length===0)
    return <Empty title="No cards yet" sub="Tap + to add your first card." />;
  return (
    <div className="space-y-3 fade-in">
      {cards.map(card => (
        <CardRow key={card.id} card={card} checks={checks} now={now} toggle={toggle}
          onEdit={()=>onEdit(card)} onDelete={()=>onDelete(card)}
          open={openExpanded===card.id} setOpen={()=>setOpenExpanded(openExpanded===card.id?null:card.id)} />
      ))}
    </div>
  );
}

function CardRow({ card, checks, now, toggle, onEdit, onDelete, open, setOpen }) {
  const creditable = card.benefits.filter(b=>b.cadence!=='perk');
  // captured this year for the card
  let captured=0, potential=0;
  creditable.forEach(b=>{
    potential += annualPotential(b);
    periodsFor(card,b,now).forEach(p=>{ if (checks[`${card.id}|${b.id}|${p.key}`]) captured += b.value; });
  });
  const liveCount = creditable.reduce((acc,b)=>{
    const p = currentPeriod(card,b,now);
    return acc + (p && !checks[`${card.id}|${b.id}|${p.key}`] ? 1 : 0);
  },0);
  const pct = potential>0 ? Math.min(100, Math.round(captured/potential*100)) : 0;
  const needsDate = card.resetType==='anniversary' && !card.anniversaryDate && creditable.some(b=>b.cadence==='annual');
  const light = lightColor(card.color);

  return (
    <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
      <button onClick={setOpen} className="w-full flex items-center gap-3.5 p-3.5 text-left">
        <div className="relative w-14 h-9 rounded-lg shrink-0 overflow-hidden shadow-inner" style={{ background: colorCss(card.color) }}>
          <div className="absolute inset-0 sheen"></div>
          <div className={`absolute bottom-1 left-1.5 w-4 h-2.5 rounded-[2px] ${light?'bg-black/20':'bg-white/30'}`}></div>
        </div>
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-2">
            <span className="font-semibold text-[15px] text-gray-900 truncate">{card.name}</span>
            {liveCount>0 && <Pill tone="blue">{liveCount} live</Pill>}
          </div>
          <div className="text-[12.5px] text-gray-400 truncate">
            {card.issuer ? card.issuer+' · ' : ''}{money(card.fee)}/yr · {money(captured)} of {money(potential)} captured
          </div>
          <div className="mt-1.5 h-1.5 rounded-full bg-gray-100 overflow-hidden">
            <div className="h-full rounded-full" style={{ width:`${pct}%`, background: pct>=100?'#34c759':'#0a84ff' }}></div>
          </div>
        </div>
        <Ic.chev style={{ width:18,height:18 }} className={`text-gray-300 transition ${open?'rotate-90':''}`}/>
      </button>

      {open &&
        <div className="px-3.5 pb-4 fade-in">
          {needsDate &&
            <div className="mb-3 flex items-center justify-between gap-2 text-[12.5px] bg-amber-50 text-amber-800 rounded-xl px-3 py-2">
              <span className="flex items-center gap-1.5"><Ic.cal style={{width:15,height:15}}/> Set a reset date to anchor annual benefits</span>
              <button onClick={onEdit} className="font-semibold text-amber-900 underline shrink-0">Set</button>
            </div>}

          <div className="text-[11px] uppercase tracking-wide text-gray-400 font-semibold mb-2 flex items-center gap-2">
            <span>Reset:</span>
            <span className="text-gray-600">{card.resetType==='calendar' ? 'Calendar year (Jan 1)' :
              card.anniversaryDate ? `Anniversary · ${fmtDate(annualCycle(card,now).renews)}` : 'Anniversary (no date)'}</span>
          </div>

          <div className="space-y-3">
            {card.benefits.map(b => <Punchcard key={b.id} card={card} b={b} now={now} checks={checks} toggle={toggle}/>)}
            {card.benefits.length===0 && <div className="text-sm text-gray-400 py-2">No benefits yet — edit the card to add some.</div>}
          </div>

          <div className="mt-4 flex gap-2">
            <button onClick={onEdit} className="flex-1 flex items-center justify-center gap-1.5 text-sm font-semibold text-gray-700 bg-gray-100 rounded-xl py-2.5 active:scale-[.98] transition">
              <Ic.edit style={{width:15,height:15}}/> Edit card
            </button>
            <button onClick={onDelete} className="px-4 flex items-center justify-center gap-1.5 text-sm font-semibold text-rose-600 bg-rose-50 rounded-xl py-2.5 active:scale-[.98] transition">
              <Ic.trash style={{width:15,height:15}}/>
            </button>
          </div>
        </div>}
    </div>
  );
}

function Punchcard({ card, b, now, checks, toggle }) {
  const perks = b.cadence==='perk';
  const periods = periodsFor(card,b,now);
  const used = periods.reduce((a,p)=> a + (checks[`${card.id}|${b.id}|${p.key}`]?1:0), 0);
  const n = CADENCES[b.cadence].n;
  return (
    <div className="rounded-xl border border-gray-100 p-3">
      <div className="flex items-start justify-between gap-2">
        <div className="min-w-0">
          <div className="font-semibold text-[14px] text-gray-900 flex items-center gap-2">
            {b.name}
            {perks && <Pill tone="purple">Perk</Pill>}
          </div>
          {b.note && <div className="text-[12px] text-gray-400 leading-snug">{b.note}</div>}
        </div>
        <div className="text-right shrink-0">
          <div className="text-[14px] font-bold text-gray-900 tabular-nums">{perks ? (b.value?money(b.value):'—') : money(b.value)}</div>
          <div className="text-[11px] text-gray-400">{perks ? 'info' : `${money(annualPotential(b))}/yr`}</div>
        </div>
      </div>

      {!perks &&
        <div className="mt-2.5 flex items-center justify-between gap-3">
          <div className="flex flex-wrap gap-1.5">
            {periods.map(p => {
              const key = `${card.id}|${b.id}|${p.key}`;
              const checked = !!checks[key];
              return (
                <button key={p.key} onClick={()=>toggle(key)} title={p.full}
                  className="grid place-items-center rounded-lg text-[10.5px] font-bold transition active:scale-90"
                  style={{
                    width: b.cadence==='monthly'?30:b.cadence==='annual'?'auto':46,
                    padding: b.cadence==='annual'?'0 12px':0,
                    height:30,
                    background: checked ? '#34c759' : '#f2f2f7',
                    color: checked ? '#fff' : (p.isCurrent?'#0a84ff':'#9ca3af'),
                    boxShadow: p.isCurrent && !checked ? 'inset 0 0 0 2px #0a84ff' : 'none',
                  }}>
                  {checked ? <Ic.check style={{width:14,height:14}}/> : p.label}
                </button>
              );
            })}
          </div>
          <div className="text-[12px] font-semibold text-gray-400 shrink-0 tabular-nums">{used}/{n}</div>
        </div>}
    </div>
  );
}

/* ----------------------------- shared bits ----------------------------- */
function SectionHead({ title, count, accent }) {
  return (
    <div className="flex items-center gap-2 px-1 mb-2">
      <h2 className="text-[13px] font-bold uppercase tracking-wide text-gray-500">{title}</h2>
      {typeof count==='number' &&
        <span className={`text-[11px] font-bold px-1.5 py-px rounded-full ${accent?'bg-blue-500 text-white':'bg-gray-200 text-gray-500'}`}>{count}</span>}
    </div>
  );
}
function Empty({ title, sub }) {
  return (
    <div className="text-center py-20 fade-in">
      <div className="text-5xl mb-3">🪪</div>
      <div className="font-semibold text-gray-700">{title}</div>
      <div className="text-sm text-gray-400 mt-1">{sub}</div>
    </div>
  );
}

/* ----------------------------- Card editor modal ----------------------------- */
function CardEditor({ initial, onSave, onClose }) {
  const blank = { id:uid(), name:'', issuer:'', color:'plum', fee:0, resetType:'calendar', anniversaryDate:'', benefits:[] };
  const [step, setStep] = useState(initial ? 'edit' : 'template'); // template | edit
  const [c, setC] = useState(initial ? JSON.parse(JSON.stringify(initial)) : blank);
  const [qty, setQty] = useState(1);

  const set = (k,v)=> setC(p=>({...p,[k]:v}));
  const setBenefit = (id,k,v)=> setC(p=>({...p, benefits:p.benefits.map(b=> b.id===id?{...b,[k]:v}:b)}));
  const addBenefit = ()=> setC(p=>({...p, benefits:[...p.benefits, B('New benefit',0,'monthly','')]}));
  const delBenefit = (id)=> setC(p=>({...p, benefits:p.benefits.filter(b=>b.id!==id)}));

  const pickTemplate = (t)=> {
    setC({ ...JSON.parse(JSON.stringify(t)), id:uid(), anniversaryDate:'' });
    setStep('edit');
  };

  const canSave = c.name.trim().length>0;
  const submit = ()=> {
    if (!canSave) return;
    const copies = Math.max(1, Math.min(20, qty|0));
    const list = [];
    for (let i=0;i<(initial?1:copies);i++) {
      list.push({
        ...JSON.parse(JSON.stringify(c)),
        id: i===0 && initial ? c.id : uid(),
        name: copies>1 && !initial ? `${c.name.trim()} #${i+1}` : c.name.trim(),
        benefits: c.benefits.map(b=>({ ...b, id: uid() })),
      });
    }
    onSave(list, !!initial);
  };

  return (
    <Modal onClose={onClose} title={initial?'Edit card':'Add card'}
      footer={ step==='edit' &&
        <div className="flex items-center gap-2">
          {!initial &&
            <div className="flex items-center gap-1.5 bg-gray-100 rounded-xl px-2.5 py-2">
              <span className="text-[12px] text-gray-500 font-medium">Qty</span>
              <input type="number" min="1" max="20" value={qty} onChange={e=>setQty(e.target.value)}
                className="w-10 bg-transparent text-center font-bold text-gray-900 outline-none"/>
            </div>}
          <button disabled={!canSave} onClick={submit}
            className="flex-1 bg-blue-500 disabled:bg-gray-200 disabled:text-gray-400 text-white font-bold rounded-xl py-3 active:scale-[.99] transition">
            {initial ? 'Save changes' : qty>1 ? `Add ${qty} cards` : 'Add card'}
          </button>
        </div>
      }>

      {step==='template' &&
        <div className="space-y-2.5">
          <p className="text-sm text-gray-500 px-1">Start from a template, or build a custom card.</p>
          {TEMPLATES.map((t,i)=>(
            <button key={i} onClick={()=>pickTemplate(t)}
              className="w-full flex items-center gap-3 bg-white border border-gray-100 rounded-2xl p-3 text-left active:scale-[.99] transition hover:border-gray-200">
              <div className="relative w-12 h-8 rounded-lg shrink-0 overflow-hidden" style={{ background: colorCss(t.color) }}>
                <div className="absolute inset-0 sheen"></div>
              </div>
              <div className="min-w-0 flex-1">
                <div className="font-semibold text-gray-900 text-[15px]">{t.name}</div>
                <div className="text-[12.5px] text-gray-400">
                  {t.issuer||'Custom'} · {t.fee?money(t.fee)+'/yr · ':''}{t.benefits.length} {t.benefits.length===1?'benefit':'benefits'}
                </div>
              </div>
              <Ic.chev style={{width:16,height:16}} className="text-gray-300"/>
            </button>
          ))}
        </div>}

      {step==='edit' &&
        <div className="space-y-4">
          <Field label="Card name">
            <input value={c.name} onChange={e=>set('name',e.target.value)} placeholder="e.g. Platinum (mine)"
              className="w-full bg-gray-100 rounded-xl px-3.5 py-2.5 outline-none font-medium text-gray-900 focus:ring-2 ring-blue-400"/>
          </Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Issuer">
              <input value={c.issuer} onChange={e=>set('issuer',e.target.value)} placeholder="Amex"
                className="w-full bg-gray-100 rounded-xl px-3.5 py-2.5 outline-none font-medium text-gray-900 focus:ring-2 ring-blue-400"/>
            </Field>
            <Field label="Annual fee ($)">
              <input type="number" value={c.fee} onChange={e=>set('fee',Number(e.target.value)||0)}
                className="w-full bg-gray-100 rounded-xl px-3.5 py-2.5 outline-none font-medium text-gray-900 focus:ring-2 ring-blue-400"/>
            </Field>
          </div>

          <Field label="Card color">
            <div className="flex flex-wrap gap-2">
              {CARD_COLORS.map(col=>(
                <button key={col.id} onClick={()=>set('color',col.id)} title={col.name}
                  className={`w-9 h-9 rounded-xl transition ${c.color===col.id?'ring-2 ring-offset-2 ring-blue-500 scale-105':''}`}
                  style={{ background: col.css }}/>
              ))}
            </div>
          </Field>

          <Field label="Resets on">
            <div className="grid grid-cols-2 gap-2">
              <Seg active={c.resetType==='calendar'} onClick={()=>set('resetType','calendar')}>Calendar year</Seg>
              <Seg active={c.resetType==='anniversary'} onClick={()=>set('resetType','anniversary')}>Card anniversary</Seg>
            </div>
            {c.resetType==='anniversary' &&
              <div className="mt-2">
                <input type="date" value={c.anniversaryDate||''} onChange={e=>set('anniversaryDate',e.target.value)}
                  className="w-full bg-gray-100 rounded-xl px-3.5 py-2.5 outline-none font-medium text-gray-900 focus:ring-2 ring-blue-400"/>
                <p className="text-[11.5px] text-gray-400 mt-1 px-1">Anchors annual benefits. Monthly / quarterly / semi-annual stay on the calendar.</p>
              </div>}
          </Field>

          <div>
            <div className="flex items-center justify-between mb-2 px-1">
              <span className="text-[12px] font-bold uppercase tracking-wide text-gray-500">Benefits</span>
              <button onClick={addBenefit} className="text-blue-500 font-semibold text-sm flex items-center gap-1"><Ic.plus style={{width:15,height:15}}/>Add</button>
            </div>
            <div className="space-y-2.5">
              {c.benefits.map(b=>(
                <div key={b.id} className="bg-gray-50 rounded-xl p-3 space-y-2">
                  <div className="flex items-center gap-2">
                    <input value={b.name} onChange={e=>setBenefit(b.id,'name',e.target.value)} placeholder="Benefit name"
                      className="flex-1 bg-white rounded-lg px-3 py-2 outline-none font-semibold text-gray-900 text-sm focus:ring-2 ring-blue-400"/>
                    <button onClick={()=>delBenefit(b.id)} className="text-gray-300 hover:text-rose-500 p-1"><Ic.trash style={{width:17,height:17}}/></button>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div className="relative">
                      <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">$</span>
                      <input type="number" value={b.value} onChange={e=>setBenefit(b.id,'value',Number(e.target.value)||0)}
                        className="w-full bg-white rounded-lg pl-7 pr-3 py-2 outline-none text-sm text-gray-900 focus:ring-2 ring-blue-400"/>
                    </div>
                    <select value={b.cadence} onChange={e=>setBenefit(b.id,'cadence',e.target.value)}
                      className="w-full bg-white rounded-lg px-3 py-2 outline-none text-sm text-gray-900 focus:ring-2 ring-blue-400">
                      {Object.entries(CADENCES).map(([k,v])=><option key={k} value={k}>{v.label}{v.n>1?` · ${v.n} boxes`:''}</option>)}
                    </select>
                  </div>
                  <input value={b.note||''} onChange={e=>setBenefit(b.id,'note',e.target.value)} placeholder="Note (optional)"
                    className="w-full bg-white rounded-lg px-3 py-2 outline-none text-sm text-gray-500 focus:ring-2 ring-blue-400"/>
                  <div className="text-[11px] text-gray-400 px-1">
                    {b.cadence==='perk' ? 'Info only — no checkboxes' :
                      `${money(b.value)} × ${CADENCES[b.cadence].n} = ${money(annualPotential(b))}/yr`}
                  </div>
                </div>
              ))}
              {c.benefits.length===0 && <div className="text-sm text-gray-400 text-center py-3">No benefits yet.</div>}
            </div>
          </div>
        </div>}
    </Modal>
  );
}

function Field({ label, children }) {
  return <div><div className="text-[12px] font-bold uppercase tracking-wide text-gray-500 mb-1.5 px-1">{label}</div>{children}</div>;
}
function Seg({ active, onClick, children }) {
  return <button onClick={onClick}
    className={`rounded-xl py-2.5 text-sm font-semibold transition ${active?'bg-blue-500 text-white':'bg-gray-100 text-gray-600'}`}>{children}</button>;
}

function Modal({ title, children, footer, onClose }) {
  useEffect(()=>{ const f=e=>{ if(e.key==='Escape') onClose(); }; window.addEventListener('keydown',f); return ()=>window.removeEventListener('keydown',f); },[]);
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center">
      <div className="absolute inset-0 bg-black/40 backdrop-blur-[2px]" onClick={onClose}></div>
      <div className="relative w-full sm:max-w-lg bg-[#f7f7f9] sm:rounded-3xl rounded-t-3xl max-h-[92vh] flex flex-col shadow-2xl fade-in">
        <div className="flex items-center justify-between px-4 py-3.5 border-b border-gray-200/70 shrink-0">
          <button onClick={onClose} className="text-blue-500 font-medium text-[15px]">Cancel</button>
          <h3 className="font-bold text-gray-900">{title}</h3>
          <div className="w-12"></div>
        </div>
        <div className="overflow-y-auto p-4 flex-1 no-scrollbar">{children}</div>
        {footer && <div className="p-4 border-t border-gray-200/70 shrink-0 bg-[#f7f7f9]/95 backdrop-blur">{footer}</div>}
      </div>
    </div>
  );
}

/* ----------------------------- confirm ----------------------------- */
function Confirm({ text, onYes, onNo }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-6">
      <div className="absolute inset-0 bg-black/40" onClick={onNo}></div>
      <div className="relative bg-white rounded-2xl p-5 w-full max-w-xs text-center shadow-2xl pop">
        <div className="font-semibold text-gray-900">{text}</div>
        <div className="mt-4 flex gap-2">
          <button onClick={onNo} className="flex-1 bg-gray-100 text-gray-700 font-semibold rounded-xl py-2.5">Cancel</button>
          <button onClick={onYes} className="flex-1 bg-rose-500 text-white font-semibold rounded-xl py-2.5">Delete</button>
        </div>
      </div>
    </div>
  );
}

/* ----------------------------- App ----------------------------- */
function App() {
  const persisted = load();
  const [cards, setCards]   = useState(persisted?.cards || []);
  const [checks, setChecks] = useState(persisted?.checks || {});
  const [users, setUsers]   = useState(persisted?.users || ['Me','Partner']);
  const [me, setMe]         = useState(persisted?.me ?? 0);
  const [view, setView]     = useState('todo');
  const [editor, setEditor] = useState(null);     // {initial} | {}
  const [confirm, setConfirm] = useState(null);   // card to delete
  const [expanded, setExpanded] = useState(null);
  const [editingNames, setEditingNames] = useState(false);

  const now = useMemo(()=>new Date(), []);

  useEffect(()=>{ save({ cards, checks, users, me }); }, [cards, checks, users, me]);

  const toggle = (key)=> setChecks(prev=>{
    const next = {...prev};
    if (next[key]) delete next[key];
    else next[key] = { by: users[me]||'Me', at: Date.now() };
    return next;
  });

  const saveCards = (list, isEdit)=>{
    if (isEdit) {
      setCards(prev=> prev.map(c=> c.id===list[0].id ? list[0] : c));
    } else {
      setCards(prev=> [...prev, ...list]);
    }
    setEditor(null);
  };

  const deleteCard = (card)=>{
    setCards(prev=> prev.filter(c=>c.id!==card.id));
    setChecks(prev=>{
      const next={...prev};
      Object.keys(next).forEach(k=>{ if (k.startsWith(card.id+'|')) delete next[k]; });
      return next;
    });
    setConfirm(null);
  };

  // stats
  const stats = useMemo(()=>{
    let claimable=0, claimableCount=0, captured=0, potential=0, fees=0;
    cards.forEach(card=>{
      fees += card.fee||0;
      card.benefits.forEach(b=>{
        if (b.cadence==='perk') return;
        potential += annualPotential(b);
        periodsFor(card,b,now).forEach(p=>{ if (checks[`${card.id}|${b.id}|${p.key}`]) captured += b.value; });
        const cp = currentPeriod(card,b,now);
        if (cp && !checks[`${card.id}|${b.id}|${cp.key}`]) { claimable += b.value; claimableCount++; }
      });
    });
    return { claimable, claimableCount, captured, potential, fees, net: captured-fees, cardCount: cards.length };
  }, [cards, checks, now]);

  return (
    <div className="min-h-screen pb-28">
      <div className="max-w-xl mx-auto px-3 sm:px-4 pt-5">

        {/* top bar */}
        <div className="flex items-center justify-between mb-4 px-1">
          <div>
            <h1 className="text-[26px] font-bold tracking-tight text-gray-900 leading-none">Perked</h1>
            <p className="text-[13px] text-gray-400 mt-0.5">{fmtDate(now)}</p>
          </div>
          <UserSwitch users={users} me={me} setMe={setMe} onEdit={()=>setEditingNames(true)}/>
        </div>

        <Hero stats={stats} now={now}/>

        {/* segmented control */}
        <div className="sticky top-2 z-10 mt-4 mb-4">
          <div className="bg-gray-200/80 backdrop-blur rounded-xl p-1 flex">
            {[['todo','To-Do'],['cards','All Cards']].map(([v,label])=>(
              <button key={v} onClick={()=>setView(v)}
                className={`flex-1 py-2 rounded-lg text-[14px] font-semibold transition ${view===v?'bg-white text-gray-900 shadow-sm':'text-gray-500'}`}>
                {label}
              </button>
            ))}
          </div>
        </div>

        {view==='todo'
          ? <TodoView cards={cards} checks={checks} now={now} toggle={toggle} users={users}/>
          : <CardsView cards={cards} checks={checks} now={now} toggle={toggle}
              onEdit={(c)=>setEditor({initial:c})} onDelete={(c)=>setConfirm(c)}
              openExpanded={expanded} setOpenExpanded={setExpanded}/>}
      </div>

      {/* FAB */}
      <button onClick={()=>setEditor({})}
        className="fixed bottom-6 right-1/2 translate-x-1/2 sm:translate-x-0 sm:right-8 z-30 bg-blue-500 text-white rounded-full shadow-xl shadow-blue-500/30 px-5 py-3.5 flex items-center gap-2 font-bold active:scale-95 transition">
        <Ic.plus style={{width:20,height:20}}/> Add card
      </button>

      {editor && <CardEditor initial={editor.initial} onSave={saveCards} onClose={()=>setEditor(null)}/>}
      {confirm && <Confirm text={`Delete "${confirm.name}"? Its checked benefits will be removed.`} onYes={()=>deleteCard(confirm)} onNo={()=>setConfirm(null)}/>}
      {editingNames && <NameEditor users={users} setUsers={setUsers} onClose={()=>setEditingNames(false)}/>}
    </div>
  );
}

function UserSwitch({ users, me, setMe, onEdit }) {
  const colors = ['bg-blue-500','bg-pink-500'];
  return (
    <div className="flex items-center gap-1.5 bg-white rounded-full p-1 shadow-sm">
      {users.map((u,i)=>(
        <button key={i} onClick={()=>setMe(i)} title={u}
          className={`w-9 h-9 rounded-full grid place-items-center font-bold text-sm transition ${me===i?colors[i%2]+' text-white scale-105':'bg-gray-100 text-gray-400'}`}>
          {(u[0]||'?').toUpperCase()}
        </button>
      ))}
      <button onClick={onEdit} className="w-7 h-9 grid place-items-center text-gray-300"><Ic.edit style={{width:14,height:14}}/></button>
    </div>
  );
}

function NameEditor({ users, setUsers, onClose }) {
  const [a,setA]=useState(users[0]); const [b,setB]=useState(users[1]);
  return (
    <Modal title="Who's using this?" onClose={onClose}
      footer={<button onClick={()=>{ setUsers([a.trim()||'Me', b.trim()||'Partner']); onClose(); }}
        className="w-full bg-blue-500 text-white font-bold rounded-xl py-3">Save names</button>}>
      <p className="text-sm text-gray-500 mb-4 px-1">Tap your avatar before checking things off so you both know who claimed what.</p>
      <Field label="Person 1"><input value={a} onChange={e=>setA(e.target.value)} className="w-full bg-gray-100 rounded-xl px-3.5 py-2.5 outline-none font-medium focus:ring-2 ring-blue-400"/></Field>
      <div className="h-3"></div>
      <Field label="Person 2"><input value={b} onChange={e=>setB(e.target.value)} className="w-full bg-gray-100 rounded-xl px-3.5 py-2.5 outline-none font-medium focus:ring-2 ring-blue-400"/></Field>
    </Modal>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
